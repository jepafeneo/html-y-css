<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form extra</title>
  </head>
  <body>
    <form action="" method="get">
      <div>
        <label for="ciudad">Ciudad:</label>
        <select name="ciudad" id="ciudad">
          <option value=""></option>
          <option value="ny">Nueva York</option>
          <option value="la">Los Ángeles</option>
          <option value="chi">Chicago</option>
        </select>
      </div>

      <div>
        <h2>Lenguajes de programación</h2>
        <label for="html">HTML:</label>
        <input type="radio" name="lenguaje" id="html" value="html" />
        <label for="css">CSS:</label>
        <input type="radio" name="lenguaje" id="css" value="css" />
        <label for="js">JavaScript:</label>
        <input type="radio" name="lenguaje" id="js" value="js" />
      </div>

      <div>
        <h2>Frameworks</h2>

        <label for="">
          <input type="checkbox" name="frameworks" value="react" />
          React
        </label>

        <label for="">
          <input type="checkbox" name="frameworks" value="vue" />
          Vue
        </label>

        <label for="">
          <input type="checkbox" name="frameworks" value="angular" />
          Angular
        </label>
      </div>

      <button type="submit">Enviar</button>
    </form>
  </body>
</html>
