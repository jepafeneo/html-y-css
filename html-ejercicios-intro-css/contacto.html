    <main>
      <h2>Contáctanos</h2>

      <form action="#" method="post">
        <h3>Formulario de Contacto</h3>
        <div>
          <label for="nombre">Nombre:</label>
          <input type="text" id="nombre" name="nombre" required />
        </div>
        <div>
          <label for="email">Correo Electrónico:</label>
          <input type="email" id="email" name="email" required />
        </div>
        <div>
          <label for="mensaje">Mensaje:</label>
          <textarea id="mensaje" name="mensaje" required></textarea>
        </div>
        <button type="submit">Enviar</button>
      </form>

      <address>
        <p>Neoland</p>
        <p>Calle Falsa 123, Ciudad, País</p>
        <p>Teléfono: +34 123 456 789</p>
        <p>Email: contacto@neoland.com</p>
      </address>

      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d194347.89542910652!2d-3.67953665!3d40.4379543!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd422997800a3c81%3A0xc436dec1618c2269!2zTWFkcmlkLCBFc3Bhw7Fh!5e0!3m2!1ses!2sar!4v1768421785759!5m2!1ses!2sar"
        width="300"
        height="200"
        style="border: 0"
        allowfullscreen=""
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
      ></iframe>
    </main>

    <footer>
      <div>
        <p>Suscríbete a nuestro boletín:</p>
        <form action="#" method="post">
          <div>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required />
          </div>
          <div>
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" required />
          </div>
          <button type="submit">Enviar</button>
        </form>
      </div>
